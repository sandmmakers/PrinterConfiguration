[gcode_macro D118]
description: M118-like macro for debugging
variable_enabled: 0
gcode:
    {% if rawparams and (printer['gcode_macro D118'].enabled|int != 0) %}
        {% set escaped_msg = rawparams.split(';', 1)[0].split('\x23', 1)[0]|replace('"', '\\"') %}
        M118 {escaped_msg}
    {% endif %}